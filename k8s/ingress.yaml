# =============================================================================
# Qmail - Ingress with SSL Termination
# =============================================================================
# Handles external traffic routing and TLS termination
# Requires: nginx-ingress controller or GKE Ingress
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qmail-ingress
  namespace: qmail
  annotations:
    # For GKE managed certificates
    # kubernetes.io/ingress.class: "gce"
    # networking.gke.io/managed-certificates: "qmail-cert"

    # For nginx-ingress controller
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Security headers
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Strict-Transport-Security: max-age=63072000; includeSubDomains; preload";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "30"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"

    # Request size limit (for attachments)
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
spec:
  tls:
    - hosts:
        - api.qmail.example.com # Replace with your domain
      secretName: qmail-tls-secret
  rules:
    - host: api.qmail.example.com # Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qmail-api
                port:
                  number: 80

---
# =============================================================================
# Namespace
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: qmail
  labels:
    name: qmail
