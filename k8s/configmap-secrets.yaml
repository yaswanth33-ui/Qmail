# =============================================================================
# Qmail - Kubernetes ConfigMap (non-sensitive configuration)
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: qmail-config
  namespace: qmail
data:
  ENV: "production"
  ENFORCE_HTTPS: "0" # SSL termination happens at Ingress/LB, not at app level
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  LOG_LEVEL: "INFO"
  SESSION_TIMEOUT_SECONDS: "3600"
  SENSITIVE_OPS_REAUTH_WINDOW: "300"
  CORS_ALLOWED_ORIGINS: "*" # Update with actual domain when available
  QRNG_BASE_URL: "https://qrng.anu.edu.au/API/jsonI.php"
  # DATABASE_URL is in secrets (contains password)

---
# =============================================================================
# Qmail - Kubernetes Secret (sensitive values - base64 encoded)
# =============================================================================
# IMPORTANT: Replace placeholder values with actual base64-encoded secrets
# Generate: echo -n "your-value" | base64
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: qmail-secrets
  namespace: qmail
type: Opaque
data:
  # echo -n "redis://redis:6379/0" | base64
  REDIS_URL: cmVkaXM6Ly9yZWRpczo2Mzc5LzA=
  # echo -n "postgresql://qmail:your-db-password@postgres:5432/qmail" | base64  (CHANGE THIS!)
  DATABASE_URL: cG9zdGdyZXNxbDovL3FtYWlsOnlvdXItZGItcGFzc3dvcmRAcG9zdGdyZXM6NTQzMi9xbWFpbA==
  # echo -n "your-db-password" | base64  (CHANGE THIS! Must match DATABASE_URL password)
  POSTGRES_PASSWORD: eW91ci1kYi1wYXNzd29yZA==
  # echo -n "your-jwt-secret-key" | base64  (CHANGE THIS!)
  JWT_SECRET_KEY: eW91ci1qd3Qtc2VjcmV0LWtleQ==
  # echo -n "your-redis-password" | base64  (CHANGE THIS!)
  REDIS_PASSWORD: Y2hhbmdlbWU=
  # echo -n "your-db-encryption-master-key" | base64  (CHANGE THIS!)
  DB_ENCRYPTION_MASTER_KEY: eW91ci1kYi1lbmNyeXB0aW9uLW1hc3Rlci1rZXk=
  # Twilio credentials (base64 encoded)
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_PHONE_NUMBER: ""
  # QRNG API key (base64 encoded)
  QRNG_API_KEY: ""
