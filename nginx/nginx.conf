# =============================================================================
# Nginx Configuration - Reverse Proxy with SSL & Security Headers
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 25M;  # Max upload size for attachments

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_send:10m rate=10r/s;

    # --- Upstream: Qmail API ---
    upstream qmail_api {
        server qmail-api:8000;
        keepalive 32;
    }

    # --- HTTP → HTTPS redirect ---
    server {
        listen 80;
        server_name _;

        # Allow health checks over HTTP
        location /health {
            proxy_pass http://qmail_api;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS server ---
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # ---------------------------------------------------------------
        # SSL/TLS Configuration
        # ---------------------------------------------------------------
        # Replace these with your actual certificate paths
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern TLS settings (TLS 1.2+ only)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling (enable with real CA-signed certificates)
        # ssl_stapling on;
        # ssl_stapling_verify on;

        # ---------------------------------------------------------------
        # Security Headers
        # ---------------------------------------------------------------
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Hide server version
        server_tokens off;

        # ---------------------------------------------------------------
        # Auth endpoints (strict rate limiting)
        # ---------------------------------------------------------------
        location /auth/ {
            limit_req zone=api_auth burst=10 nodelay;
            proxy_pass http://qmail_api;
            include /etc/nginx/proxy_params_common;
        }

        # ---------------------------------------------------------------
        # Send endpoints (moderate rate limiting)
        # ---------------------------------------------------------------
        location ~ ^/(messages/send|email/send|encrypted/send) {
            limit_req zone=api_send burst=20 nodelay;
            proxy_pass http://qmail_api;
            include /etc/nginx/proxy_params_common;
        }

        # ---------------------------------------------------------------
        # Health check (no rate limit)
        # ---------------------------------------------------------------
        location /health {
            proxy_pass http://qmail_api;
            include /etc/nginx/proxy_params_common;
        }

        # ---------------------------------------------------------------
        # API docs (Swagger UI) - disable in production if needed
        # ---------------------------------------------------------------
        location ~ ^/(docs|redoc|openapi.json) {
            limit_req zone=api_general burst=5 nodelay;
            proxy_pass http://qmail_api;
            include /etc/nginx/proxy_params_common;
        }

        # ---------------------------------------------------------------
        # All other API routes
        # ---------------------------------------------------------------
        location / {
            limit_req zone=api_general burst=50 nodelay;
            proxy_pass http://qmail_api;
            include /etc/nginx/proxy_params_common;
        }
    }
}
