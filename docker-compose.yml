# =============================================================================
# Qmail - Docker Compose Production Setup
# =============================================================================
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose logs -f qmail-api  # View API logs
#   docker-compose down               # Stop all services
#
# IMPORTANT: Copy .env.production to .env and fill in secrets before deploying
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Qmail API Server (FastAPI backend)
  # ---------------------------------------------------------------------------
  qmail-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qmail-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENV=production
      - ENFORCE_HTTPS=0
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - DATABASE_URL=postgresql://qmail:${POSTGRES_PASSWORD:-changeme}@postgres:5432/qmail
    # No volume mounts needed — PostgreSQL handles all persistent data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qmail-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # PostgreSQL - Primary production database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: qmail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qmail
      POSTGRES_USER: qmail
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      # Performance tuning for encrypted email workloads
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    # Port not exposed to host — only accessible within Docker network
    # Uncomment below if you need direct host access:
    # ports:
    #   - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qmail-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qmail -d qmail"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Security: limit shared memory for PG
    shm_size: "256mb"

  # ---------------------------------------------------------------------------
  # Redis - Token revocation, rate limiting, session management
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: qmail-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - qmail-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Nginx - Reverse proxy with SSL termination
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: qmail-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params_common:/etc/nginx/proxy_params_common:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      qmail-api:
        condition: service_healthy
    networks:
      - qmail-network

# ---------------------------------------------------------------------------
# Named volumes for persistent data
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ---------------------------------------------------------------------------
# Internal network
# ---------------------------------------------------------------------------
networks:
  qmail-network:
    driver: bridge
