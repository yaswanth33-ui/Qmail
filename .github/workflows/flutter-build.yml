# =============================================================================
# Qmail - Flutter Multi-Platform Build (GitHub Actions)
# =============================================================================
# Builds Flutter app for Linux, macOS, Windows, Web, and Android
# Uploads artifacts as downloadable zip files
# =============================================================================

name: Flutter Multi-Platform Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

env:
  FLUTTER_VERSION: '3.42.0'  # Match your project's Flutter version

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build for Linux
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake clang ninja-build pkg-config libgtk-3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: master

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Create Linux platform files
        run: flutter create --platforms=linux .

      - name: Create .env file
        run: touch .env

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Archive Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar czf ${{ github.workspace }}/qmail-linux-x64.tar.gz *

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmail-linux-x64
          path: qmail-linux-x64.tar.gz
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 2: Build for macOS
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: master

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Create macOS platform files
        run: flutter create --platforms=macos .

      - name: Create .env file
        run: touch .env

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Archive macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ${{ github.workspace }}/qmail-macos.zip qmail.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmail-macos
          path: qmail-macos.zip
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 3: Build for Windows
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: master

      - name: Create Windows platform files
        run: flutter create --platforms=windows .

      - name: Create .env file
        run: New-Item -Path .env -ItemType File -Force
        shell: pwsh

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Archive Windows build
        run: |
          $releasePath = Get-ChildItem -Path build\windows -Recurse -Directory -Filter "Release" | Select-Object -First 1
          if (-not $releasePath) {
            $releasePath = Get-ChildItem -Path build\windows -Recurse -Directory -Filter "runner" | Select-Object -First 1
            if ($releasePath) { $releasePath = $releasePath.Parent }
          }
          Write-Host "Release path: $($releasePath.FullName)"
          Get-ChildItem -Path build\windows -Recurse -Directory | Select-Object FullName
          Compress-Archive -Path "$($releasePath.FullName)\*" -DestinationPath qmail-windows-x64.zip
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmail-windows-x64
          path: qmail-windows-x64.zip
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 4: Build for Web
  # ---------------------------------------------------------------------------
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: master

      - name: Create Web platform files
        run: flutter create --platforms=web .

      - name: Create .env file
        run: touch .env

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web release
        run: flutter build web --release --no-wasm-dry-run

      - name: Archive Web build
        run: |
          cd build/web
          tar czf ${{ github.workspace }}/qmail-web.tar.gz *

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmail-web
          path: qmail-web.tar.gz
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 5: Build for Android
  # ---------------------------------------------------------------------------
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: master

      - name: Create Android platform files
        run: flutter create --platforms=android .

      - name: Create .env file
        run: touch .env

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: qmail-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 6: Build for iOS
  # ---------------------------------------------------------------------------
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: master

      - name: Create iOS platform files
        run: flutter create --platforms=ios .

      - name: Create .env file
        run: touch .env

      - name: Get dependencies
        run: flutter pub get

      - name: Disable code signing
        run: |
          cd ios
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj || true
          cat > exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>compileBitcode</key>
            <false/>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Archive iOS build
        run: |
          cd build/ios/iphoneos
          zip -r ${{ github.workspace }}/qmail-ios.zip Runner.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmail-ios
          path: qmail-ios.zip
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 7: Create GitHub Release (on tag push)
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, build-web, build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/qmail-linux-x64/qmail-linux-x64.tar.gz
            artifacts/qmail-macos/qmail-macos.zip
            artifacts/qmail-windows-x64/qmail-windows-x64.zip
            artifacts/qmail-web/qmail-web.tar.gz
            artifacts/qmail-android-apk/app-release.apk
            artifacts/qmail-ios/qmail-ios.zip
          generate_release_notes: true
