# =============================================================================
# Qmail - CI/CD Pipeline (GitHub Actions)
# =============================================================================
# Triggers:
#   - Push to main branch → Build, test, and deploy to GKE
#   - Pull request → Build and test only
# =============================================================================

name: CI/CD - Build & Deploy Qmail

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: qmail-cluster
  GKE_ZONE: us-central1-a
  IMAGE: qmail-backend
  REGISTRY: gcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Test
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run security tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run smoke check
        run: |
          python scripts/smoke_check.py

  # ---------------------------------------------------------------------------
  # Job 2: Build & Push Docker Image
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t $REGISTRY/$PROJECT_ID/$IMAGE:${{ github.sha }} \
            -t $REGISTRY/$PROJECT_ID/$IMAGE:latest \
            .

      - name: Push Docker image
        run: |
          docker push $REGISTRY/$PROJECT_ID/$IMAGE:${{ github.sha }}
          docker push $REGISTRY/$PROJECT_ID/$IMAGE:latest

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to GKE
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Create namespace (if not exists)
        run: kubectl create namespace qmail --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy ConfigMap & Secrets
        run: kubectl apply -f k8s/configmap-secrets.yaml

      - name: Deploy Storage
        run: kubectl apply -f k8s/storage.yaml

      - name: Deploy Redis
        run: kubectl apply -f k8s/redis.yaml

      - name: Deploy Qmail API
        run: |
          # Update image tag in deployment
          sed -i "s|gcr.io/YOUR_PROJECT_ID/qmail-backend:latest|$REGISTRY/$PROJECT_ID/$IMAGE:${{ github.sha }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Deploy Ingress
        run: kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/qmail-api -n qmail --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n qmail
          kubectl get services -n qmail
          kubectl get ingress -n qmail
